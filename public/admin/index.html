<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- iOS対策 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>ビカクシダ管理 CMS</title>

    <style>
      @media (max-width: 768px) {

        /* ===== モーダル補正 ===== */

        [role="dialog"] {
          position: fixed !important;
          inset: 0 !important;
          width: 100vw !important;
          height: 100vh !important;
          max-width: 100vw !important;
          max-height: 100vh !important;
          overflow: auto !important;
          background: #fff !important;
        }

        [role="dialog"] > div {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
        }

        [role="dialog"] img {
          width: 100% !important;
          height: auto !important;
        }

        [role="dialog"] [class*="grid"],
        [role="dialog"] [class*="Grid"] {
          display: grid !important;
          grid-template-columns: 1fr 1fr !important;
          gap: 8px !important;
        }

        [role="dialog"] button {
          position: sticky !important;
          bottom: 0 !important;
          z-index: 9999 !important;
          background: white !important;
        }

      }
    </style>
  </head>

  <body>

    <!-- 🔥 Decap CMS本体（これだけでOK） -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      /* =========================
         プレビューCSS
      ========================= */
      CMS.registerPreviewStyle(`
        img { max-width: 100%; max-height: 280px; object-fit: cover; display: block; }
        body { font-family: sans-serif; padding: 20px; font-size: 14px; }
        h1 { font-size: 22px; margin: 8px 0 4px; }
        p { margin: 4px 0; color: #555; }
      `);

      /* =========================
         プレビューテンプレート
      ========================= */
      CMS.registerPreviewTemplate('plants', ({ entry }) => {
        const data = entry.getIn(['data']).toJS();

        return h('div', { style: { maxWidth: '600px', padding: '16px' } },

          data.cover_image && h('img', {
            src: data.cover_image,
            style: {
              width: '100%',
              maxHeight: '280px',
              objectFit: 'cover',
              marginBottom: '16px'
            }
          }),

          h('p', { style: { fontSize: '11px', color: '#4a7a3a' } }, data.status),

          h('h1', {}, data.title),

          h('p', { style: { fontStyle: 'italic', color: '#888' } }, data.species),

          h('p', {}, '📅 ' + (data.acquired_date || '—')),
          h('p', {}, '📍 ' + (data.location || '—')),
          h('p', {}, '🪵 ' + (data.mount || '—')),
          
          data.description && h('p', {
            style: {
              marginTop: '12px',
              lineHeight: '1.8'
            }
          }, data.description)
        );
      });
    </script>

  </body>
</html>
